<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Course</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        function fmtDay(d){ return d ? new Date(d + 'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : ''; }

        // ── COURSE FEEDBACK (ratings for course / teachers / materials) ──
        let STUDENT_UID = null, FB = {}, FB_COURSE_ID = null;
        function fbKey(type, id){ return type + ':' + (id || ''); }

        async function loadFeedback(courseId){
            const box = document.getElementById('feedback-box');
            if (!box) return;
            FB_COURSE_ID = courseId;
            const [ctRes, fbRes] = await Promise.all([
                db.from('course_teachers').select('teacher_id, teacher_name').eq('course_id', courseId),
                db.from('feedback').select('id, target_type, target_id, stars, comment').eq('course_id', courseId)
            ]);
            // Name is stored on the row — students can't read staff profiles directly.
            const teachers = (ctRes.data || []).map(r => ({ id: r.teacher_id, full_name: r.teacher_name || 'Teacher' }));
            FB = {};
            (fbRes.data || []).forEach(f => { FB[fbKey(f.target_type, f.target_id)] = f; });

            const cards = [];
            cards.push(fbCard('Overall course', 'How would you rate this course overall?', 'course', null));
            cards.push(fbCard('Study materials', 'Slides, PDFs and resources provided.', 'materials', null));
            teachers.forEach(t => cards.push(fbCard(esc(t.full_name || 'Teacher'), 'Rate this teacher and leave feedback.', 'teacher', t.id)));

            box.innerHTML = `
                <div class="section">
                    <div class="section-title">⭐ Course Feedback</div>
                    <div class="att-card">
                        <p style="font-size:13px;color:var(--text-muted);margin:-4px 0 14px;line-height:1.5;">Your feedback is private and <strong>anonymous to teachers</strong> — it helps the Academy improve. You can update it anytime.</p>
                        <div style="display:flex;flex-direction:column;gap:14px;">${cards.join('')}</div>
                    </div>
                </div>`;

            if (!box._fbBound) {
                box._fbBound = true;
                box.addEventListener('click', onFeedbackClick);
            }
        }

        function fbCard(title, sub, type, targetId){
            const existing = FB[fbKey(type, targetId)];
            const cur = existing ? existing.stars : 0;
            const comment = existing && existing.comment ? existing.comment : '';
            return `<div class="fb-card" data-type="${type}" data-target="${targetId || ''}" data-selected="${cur}">
                <div style="font-weight:700;color:var(--navy-800);">${title}</div>
                <div style="font-size:12px;color:var(--text-muted);margin:2px 0 8px;">${sub}</div>
                <div class="fb-stars">${[1,2,3,4,5].map(i => `<span class="fb-star ${i <= cur ? 'on' : ''}" data-star="${i}">★</span>`).join('')}</div>
                <textarea class="fb-comment" rows="2" placeholder="Optional comment…">${esc(comment)}</textarea>
                <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                    <button class="btn btn-primary btn-sm fb-save">${existing ? 'Update' : 'Submit'}</button>
                    <span class="fb-saved" style="font-size:12px;"></span>
                </div>
            </div>`;
        }

        async function onFeedbackClick(e){
            const star = e.target.closest('.fb-star');
            if (star){
                const card = star.closest('.fb-card');
                const val = +star.dataset.star;
                card.querySelectorAll('.fb-star').forEach(s => s.classList.toggle('on', +s.dataset.star <= val));
                card.dataset.selected = val;
                return;
            }
            const save = e.target.closest('.fb-save');
            if (save) await saveFeedback(save.closest('.fb-card'), save);
        }

        async function saveFeedback(card, btn){
            const type = card.dataset.type;
            const targetId = card.dataset.target || null;
            const selected = +card.dataset.selected || 0;
            const saved = card.querySelector('.fb-saved');
            if (!selected){ saved.style.color = 'var(--red)'; saved.textContent = 'Pick a star rating first.'; return; }
            const comment = card.querySelector('.fb-comment').value.trim();
            const key = fbKey(type, targetId);
            const existing = FB[key];
            btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Saving…'; saved.textContent = '';
            try {
                const payload = { stars: selected, comment: comment || null, updated_at: new Date().toISOString() };
                let row;
                if (existing && existing.id){
                    const { error } = await db.from('feedback').update(payload).eq('id', existing.id);
                    if (error) throw new Error(error.message);
                    row = { ...existing, ...payload };
                } else {
                    const ins = await db.from('feedback').insert({ student_id: STUDENT_UID, course_id: FB_COURSE_ID, target_type: type, target_id: targetId, ...payload }).select('id').single();
                    if (ins.error) throw new Error(ins.error.message);
                    row = { id: ins.data.id, target_type: type, target_id: targetId, ...payload };
                }
                FB[key] = row;
                saved.style.color = 'var(--green)'; saved.textContent = 'Saved ✓';
                setTimeout(() => { saved.textContent = ''; }, 2000);
                btn.textContent = 'Update';
            } catch (err) {
                saved.style.color = 'var(--red)'; saved.textContent = err.message;
                btn.textContent = orig;
            } finally { btn.disabled = false; }
        }

        // Read-only attendance for this student in this course. They see only their own marks (enforced by RLS).
        async function loadAttendance(courseId){
            const box = document.getElementById('att-box');
            if (!box) return;
            const { data: sessions, error: sErr } = await db.from('class_sessions')
                .select('id, session_date').eq('course_id', courseId).order('session_date', { ascending: true });
            if (sErr) { console.error('[course] attendance failed to load:', sErr); box.innerHTML = ''; return; }
            if (!sessions || sessions.length === 0) { box.innerHTML = ''; return; }   // nothing to show until a class is held

            const sesIds = sessions.map(s => s.id);
            const { data: marks } = await db.from('attendance').select('session_id, present').in('session_id', sesIds);
            const mp = {}; (marks || []).forEach(m => { mp[m.session_id] = m.present; });

            // Office-set minimum attendance (default 80%).
            let attMin = 80;
            try { const { data: gs } = await db.from('app_settings').select('value').eq('key', 'attendance_min').limit(1); if (gs && gs[0] && gs[0].value != null) attMin = Number(gs[0].value) || 80; } catch (e) {}

            let attended = 0;
            const dayRows = sessions.map(s => {
                const ok = mp[s.id] === true; if (ok) attended++;
                return `<div class="att-day"><span class="d">${fmtDay(s.session_date)}</span><span class="att-badge ${ok ? 'ok' : 'no'}">${ok ? '✓ Present' : '✗ Absent'}</span></div>`;
            }).join('');
            const pct = Math.round(attended / sessions.length * 100);
            const color = pct >= attMin ? 'att-green' : (pct >= attMin - 10 ? 'att-amber' : 'att-red');
            const warn = pct < attMin
                ? `<div class="att-warn">⚠️ Your attendance is ${pct}% — below the required ${attMin}% (${attended} of ${sessions.length} classes attended). Please attend your upcoming classes and contact the office if you need to discuss missed sessions.</div>`
                : '';
            box.innerHTML = `
                <div class="section">
                    <div class="section-title">🗓️ My Attendance</div>
                    <div class="att-card">
                        <div class="att-summary">
                            <div class="att-big ${color}">${pct}%</div>
                            <div class="att-sub">${attended} of ${sessions.length} class${sessions.length === 1 ? '' : 'es'} attended</div>
                        </div>
                        ${warn}
                        <div class="att-list">${dayRows}</div>
                    </div>
                </div>`;
        }

        // Grades: written exams (weighted) + oral presentations (weighted, with feedback) + teacher adjustment.
        // Overall = weighted average of GRADED items (current standing) + adjustment. RLS returns only this student's own data.
        async function loadGrades(courseId){
            const box = document.getElementById('grades-box');
            if (!box) return;

            const { data: ec } = await db.from('exam_courses').select('exam_id').eq('course_id', courseId);
            const examIds = [...new Set((ec || []).map(r => r.exam_id))];
            let exams = [];
            if (examIds.length) {
                const { data } = await db.from('exams').select('id, title, weight_percent, is_visible').in('id', examIds);
                exams = (data || []).filter(e => e.is_visible !== false);
            }
            const { data: oralsData } = await db.from('oral_presentations')
                .select('id, title, weight_percent, order_index').eq('course_id', courseId)
                .order('order_index', { ascending: true, nullsFirst: false }).order('created_at', { ascending: true });
            const orals = oralsData || [];

            // Global grade settings + this course's quizzes (all-or-nothing slice).
            const { data: gs } = await db.from('app_settings').select('key, value').in('key', ['grade_quizzes_weight', 'grade_bonus_cap', 'grade_pass_min']);
            let quizWeight = 10, bonusCap = 10, passMin = 60;
            (gs || []).forEach(r => { if (r.key === 'grade_quizzes_weight') quizWeight = Number(r.value) || 0; if (r.key === 'grade_bonus_cap') bonusCap = Number(r.value) || 0; if (r.key === 'grade_pass_min') passMin = Number(r.value) || 0; });

            const { data: csRows } = await db.from('course_subjects').select('room_id').eq('course_id', courseId);
            const roomIds = [...new Set((csRows || []).map(r => r.room_id))];
            let courseQuizIds = [];
            if (roomIds.length) { const { data: qz } = await db.from('quizzes').select('id').in('room_id', roomIds).eq('is_visible', true); courseQuizIds = (qz || []).map(q => q.id); }
            const hasQuizzes = courseQuizIds.length > 0 && quizWeight > 0;

            if (exams.length === 0 && orals.length === 0 && !hasQuizzes) { box.innerHTML = ''; return; }

            const [atR, ogR, adjR, qaR] = await Promise.all([
                examIds.length ? db.from('exam_attempts').select('exam_id, score').in('exam_id', examIds) : Promise.resolve({ data: [] }),
                orals.length ? db.from('oral_grades').select('oral_presentation_id, score, feedback') : Promise.resolve({ data: [] }),
                db.from('course_grade_adjustments').select('adjustment, note').eq('course_id', courseId),
                hasQuizzes ? db.from('quiz_attempts').select('quiz_id, score').in('quiz_id', courseQuizIds) : Promise.resolve({ data: [] })
            ]);
            const attemptBy = {}; (atR.data || []).forEach(a => { attemptBy[a.exam_id] = a; });
            const oralBy = {}; (ogR.data || []).forEach(g => { oralBy[g.oral_presentation_id] = g; });
            const adj = (adjR.data || [])[0] || null;
            const adjVal = adj ? Math.max(-bonusCap, Math.min(bonusCap, Number(adj.adjustment || 0))) : 0;
            const passedSet = new Set((qaR.data || []).filter(a => a.score != null && Number(a.score) >= 100).map(a => a.quiz_id));
            const quizzesPassedAll = hasQuizzes && courseQuizIds.every(qid => passedSet.has(qid));

            let earned = 0, wsum = 0, graded = 0;
            const total = exams.length + orals.length + (hasQuizzes ? 1 : 0);
            exams.forEach(e => { const a = attemptBy[e.id]; if (a && a.score != null) { earned += Number(a.score) * Number(e.weight_percent || 0); wsum += Number(e.weight_percent || 0); graded++; } });
            orals.forEach(o => { const g = oralBy[o.id]; if (g && g.score != null) { earned += Number(g.score) * Number(o.weight_percent || 0); wsum += Number(o.weight_percent || 0); graded++; } });
            if (hasQuizzes && quizzesPassedAll) { earned += 100 * quizWeight; wsum += quizWeight; graded++; }
            const net = wsum > 0 ? earned / wsum : null;
            const overall = net != null ? Math.max(0, Math.min(100, net + adjVal)) : null;

            const pendPill = '<span style="color:var(--text-muted);font-weight:600;">Pending</span>';
            const row = (icon, title, sub, scoreHtml, fbHtml) => `
                <div class="att-day" style="align-items:flex-start;flex-wrap:wrap;">
                    <span class="d">${icon} <strong>${title}</strong><br><span style="font-size:12px;color:var(--text-muted);">${sub}</span></span>
                    <span style="font-weight:800;color:var(--navy-800);">${scoreHtml}</span>
                    ${fbHtml}
                </div>`;
            const rowsHtml = [
                ...exams.map(e => { const a = attemptBy[e.id]; const sc = (a && a.score != null) ? Math.round(a.score) + '%' : pendPill; return row('📝', esc(e.title), 'Written exam · ' + Number(e.weight_percent) + '%', sc, ''); }),
                ...orals.map(o => { const g = oralBy[o.id]; const sc = (g && g.score != null) ? Math.round(g.score) + '%' : pendPill; const fb = (g && g.feedback) ? `<div style="flex-basis:100%;margin-top:8px;font-size:13px;color:var(--text);background:var(--bg);border-left:3px solid var(--blue-400);padding:9px 11px;border-radius:6px;line-height:1.55;"><strong style="color:var(--navy-800);">Feedback:</strong> ${esc(g.feedback)}</div>` : ''; return row('🎤', esc(o.title), 'Oral presentation · ' + Number(o.weight_percent) + '%', sc, fb); }),
                ...(hasQuizzes ? [ row('✅', 'Quizzes', 'Pass all quizzes · ' + quizWeight + '%', quizzesPassedAll ? '<span style="color:var(--green);">Passed ✓</span>' : '<span style="color:var(--text-muted);font-weight:600;">Pending — pass all quizzes</span>', '') ] : [])
            ].join('');

            const color = overall == null ? '' : (overall >= 60 ? 'att-green' : (overall >= 50 ? 'att-amber' : 'att-red'));
            const adjLine = (adj && adjVal !== 0)
                ? `<div class="att-warn" style="background:#eff5ff;color:#1e3a5f;border-color:#bfdbfe;">Teacher adjustment: <strong>${adjVal > 0 ? '+' + adjVal : adjVal}</strong>${adj.note ? ' · ' + esc(adj.note) : ''}</div>`
                : '';
            const gradeWarn = (overall != null && overall < passMin)
                ? `<div class="att-warn">⚠️ Your overall grade is ${Math.round(overall)}% — below the required ${passMin}%. Please focus on your upcoming exams and presentations, and contact the office if you'd like support.</div>`
                : '';
            box.innerHTML = `
                <div class="section">
                    <div class="section-title">🎓 My Grades</div>
                    <div class="att-card">
                        <div class="att-summary">
                            <div class="att-big ${color}">${overall != null ? Math.round(overall) + '%' : '—'}</div>
                            <div class="att-sub">${net != null ? 'Overall score · ' + graded + ' of ' + total + ' items graded' : 'No grades entered yet'}</div>
                        </div>
                        ${gradeWarn}
                        ${adjLine}
                        <div class="att-list">${rowsHtml}</div>
                        <p style="font-size:12px;color:var(--text-muted);margin-top:12px;line-height:1.5;">Your overall score is a weighted average of the items graded so far, plus any teacher adjustment. It updates as more exams and presentations are graded.</p>
                    </div>
                </div>`;
        }

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            STUDENT_UID = auth.session.user.id;
            const courseId = new URLSearchParams(location.search).get('id');
            if (!courseId) { location.href = 'courses.html'; return; }

            const errBox = (what) => `<div class="empty-state"><h3 style="color:var(--red)">Couldn't load ${what}</h3><p>Please refresh the page. If it keeps happening, contact the office.</p></div>`;

            const { data: course, error: courseErr } = await db.from('courses').select('id, name, expires_at').eq('id', courseId).single();
            if (courseErr && courseErr.code !== 'PGRST116') {  // PGRST116 = no rows (not enrolled / not found) → redirect; otherwise a real failure
                console.error('[course] course failed to load:', courseErr);
                renderLayout('courses', 'Course', '', auth.profile);
                document.getElementById('page-content').innerHTML = errBox('this course') + `<a class="btn btn-ghost" href="courses.html" style="margin-top:12px;">← All Courses</a>`;
                return;
            }
            if (!course) { location.href = 'courses.html'; return; }
            renderLayout('courses', course.name, 'Subjects in this course', auth.profile);

            document.getElementById('page-content').innerHTML = `
                ${crumbs([{ label: 'My Courses', href: 'courses.html' }, { label: course.name }])}
                <a class="btn btn-ghost" href="courses.html" style="margin-bottom:18px;">← All Courses</a>
                ${course.expires_at ? `<div style="font-size:13px;color:var(--text-muted);margin:-6px 0 18px;display:flex;align-items:center;gap:6px;">🗓️ This course will expire on ${fmtDay(course.expires_at)}.</div>` : ''}
                <div id="box"><div class="loader">Loading subjects…</div></div>
                <div id="att-box" style="margin-top:24px;"></div>
                <div id="grades-box" style="margin-top:24px;"></div>
                <div id="feedback-box" style="margin-top:24px;"></div>`;
            const box = document.getElementById('box');
            loadAttendance(courseId);   // independent of subjects; renders only once classes exist
            loadGrades(courseId);       // exams + oral presentations + overall score
            loadFeedback(courseId);     // ratings: course / teachers / materials

            const { data: cs, error: csErr } = await db.from('course_subjects').select('room_id').eq('course_id', courseId);
            if (csErr) { console.error('[course] subjects failed to load:', csErr); box.innerHTML = errBox('subjects'); return; }
            const roomIds = (cs || []).map(r => r.room_id);
            let rooms = [];
            if (roomIds.length) {
                const { data, error: roomsErr } = await db.from('rooms').select('id, name, description, is_visible, image_url').in('id', roomIds).order('order_index', { ascending: true });
                if (roomsErr) { console.error('[course] rooms failed to load:', roomsErr); box.innerHTML = errBox('subjects'); return; }
                rooms = (data || []).filter(r => r.is_visible);  // hide subjects the teacher hid
            }

            if (rooms.length === 0) {
                box.innerHTML = `<div class="empty-state"><h3>No subjects available</h3><p>Your teacher hasn't released subjects for this course yet.</p></div>`;
                return;
            }
            box.innerHTML = `<div class="card-grid">${rooms.map(r => `
                <div class="course-card" onclick="location.href='subject.html?id=${encodeURIComponent(r.id)}&course=${encodeURIComponent(courseId)}'">
                    <div class="cc-top" ${r.image_url ? `style="background:url('${esc(r.image_url)}') center/cover;"` : 'style="background:linear-gradient(135deg,#0d2a52,#4a90d9);"'}>${r.image_url ? '' : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`}</div>
                    <div class="cc-body">
                        <div class="cc-title">${esc(r.name)}</div>
                        <div class="cc-sub">${esc(r.description) || 'Presentations, video lectures & quizzes'}</div>
                        <div class="cc-meta">Open subject →</div>
                    </div>
                </div>`).join('')}</div>`;
        })();
    </script>
</body>
</html>
