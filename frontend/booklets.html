<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Booklets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        const LOCK = '<span class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Not released yet</span>';
        function openBooklet(path, title){ location.href = `viewer.html?path=${encodeURIComponent(path)}&title=${encodeURIComponent(title||'Booklet')}`; }

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            renderLayout('booklets', 'Digital Booklets', 'Exam-simulation booklets', auth.profile);
            document.getElementById('page-content').innerHTML = `<div id="box"><div class="loader">Loading booklets…</div></div>`;

            const { data, error } = await db.from('booklets')
                .select('id, title, type, storage_path, is_visible, created_at')
                .order('created_at', { ascending: false });

            const box = document.getElementById('box');
            if (error) { box.innerHTML = `<div class="empty-state"><p>Could not load booklets.</p></div>`; return; }
            const list = data || [];
            if (list.length === 0) { box.innerHTML = `<div class="empty-state"><h3>No booklets yet</h3><p>Practice exam booklets will appear here.</p></div>`; return; }

            box.innerHTML = list.map(b => `
                <div class="item-row ${b.is_visible ? '' : 'locked'}">
                    <div class="ir-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
                    <div class="ir-body"><div class="ir-title">${esc(b.title)}</div><div class="ir-sub">${esc((b.type||'file').toUpperCase())}</div></div>
                    ${b.is_visible ? `<button class="btn btn-primary js-read" data-path="${esc(b.storage_path)}" data-title="${esc(b.title)}">Read</button>` : LOCK}
                </div>`).join('');

            box.addEventListener('click', e => {
                const b = e.target.closest('.js-read');
                if (b) openBooklet(b.dataset.path, b.dataset.title);
            });
        })();
    </script>
</body>
</html>
