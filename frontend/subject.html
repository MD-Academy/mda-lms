<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Subject</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <!-- VIDEO PLAYER MODAL -->
    <div class="vid-overlay" id="vid-overlay">
        <div class="vid-box">
            <div class="vid-head">
                <h3 id="vid-title">Video</h3>
                <button class="vid-close" onclick="closeVideo()" title="Close (Esc)">&times;</button>
            </div>
            <video id="vid-player" controls controlsList="nodownload" disablePictureInPicture oncontextmenu="return false;"></video>
        </div>
    </div>

    <!-- EMBEDDED PRESENTATION VIEWER (no new tab, no URL shown) -->
    <div class="embed-overlay" id="embed-overlay">
        <div class="embed-shell">
            <div class="embed-bar">
                <div class="embed-titlewrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20v14H2z"/><path d="M8 21h8M12 17v4"/></svg>
                    <span class="embed-title" id="embed-title">Presentation</span>
                    <span class="embed-brand">Medical Doctor Academy</span>
                </div>
                <div class="embed-actions">
                    <button class="embed-btn" onclick="embedFullscreen()" title="Fullscreen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
                        Fullscreen
                    </button>
                    <button class="embed-btn embed-close" onclick="closeEmbed()" title="Close (Esc)">&times;</button>
                </div>
            </div>
            <div class="embed-frame-wrap">
                <iframe id="embed-frame" allow="fullscreen" allowfullscreen referrerpolicy="no-referrer" title="Presentation"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        function fmtDate(d){ return d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : ''; }

        const LOCK = '<span class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Not released yet</span>';
        const secErr = (what) => `<div class="empty-state" style="padding:24px;"><h3 style="color:var(--red)">Couldn't load ${what}</h3><p>Please refresh. If it keeps happening, contact the office.</p></div>`;
        const empty = (msg) => `<div class="empty-state" style="padding:24px;"><p>${msg}</p></div>`;

        // Category icons (re-used in the cards' banners and the section headers).
        const IC_PRES  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20v14H2z"/><path d="M8 21h8M12 17v4"/></svg>';
        const IC_VIDEO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>';
        const IC_QUIZ  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
        const IC_FILE  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

        let WM_LABEL = '';
        function openVideo(url, title) {
            document.getElementById('vid-title').textContent = title || 'Video';
            const p = document.getElementById('vid-player');
            p.src = url;
            document.getElementById('vid-overlay').classList.add('open');
            p.play().catch(()=>{});
            startVideoWatermark(WM_LABEL);
        }
        function closeVideo() {
            stopVideoWatermark();
            const p = document.getElementById('vid-player');
            p.pause(); p.removeAttribute('src'); p.load();
            document.getElementById('vid-overlay').classList.remove('open');
        }
        function openMaterial(path, title) {
            location.href = `viewer.html?path=${encodeURIComponent(path)}&title=${encodeURIComponent(title || 'Material')}`;
        }

        // Open an external presentation EMBEDDED in the LMS — no new tab, no URL shown.
        function openEmbed(url, title) {
            if (!url || !/^https?:\/\//i.test(url)) return;
            document.getElementById('embed-title').textContent = title || 'Presentation';
            document.getElementById('embed-frame').src = url;
            document.getElementById('embed-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeEmbed() {
            const f = document.getElementById('embed-frame');
            f.removeAttribute('src');
            document.getElementById('embed-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }
        function embedFullscreen() {
            const f = document.getElementById('embed-frame');
            (f.requestFullscreen || f.webkitRequestFullscreen || f.msRequestFullscreen || function(){}).call(f);
        }
        document.addEventListener('keydown', e => {
            if (e.key !== 'Escape') return;
            closeVideo();
            // Esc closes the embed only when not in browser fullscreen (let FS exit first).
            if (!document.fullscreenElement) closeEmbed();
        });

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            WM_LABEL = (auth.profile.full_name || 'Student') + ' · ' + (auth.session.user.email || '');
            const roomId = new URLSearchParams(location.search).get('id');
            const courseId = new URLSearchParams(location.search).get('course');
            if (!roomId) { location.href = 'courses.html'; return; }

            // Remember the last presentation opened so we can highlight it on return.
            const LAST_KEY = 'lastReadMat:' + roomId;
            let lastReadId = sessionStorage.getItem(LAST_KEY) || '';

            const { data: room, error: roomErr } = await db.from('rooms').select('id, name, description, is_visible').eq('id', roomId).single();
            if (roomErr && roomErr.code !== 'PGRST116') {  // PGRST116 = no rows (hidden/not enrolled) → redirect; anything else is a real failure
                console.error('[subject] subject failed to load:', roomErr);
                renderLayout('courses', 'Subject', '', auth.profile);
                document.getElementById('page-content').innerHTML = secErr('this subject') + `<a class="btn btn-ghost" href="courses.html" style="margin-top:12px;">← Back to courses</a>`;
                return;
            }
            if (!room || !room.is_visible) { location.href = 'courses.html'; return; }
            renderLayout('courses', room.name, 'Presentations, video lectures & quizzes', auth.profile);

            // Breadcrumb trail: My Courses → [Course] → [Subject]. Course step appears when we know which course we came from.
            const crumbItems = [{ label: 'My Courses', href: 'courses.html' }];
            if (courseId) {
                const { data: c } = await db.from('courses').select('name').eq('id', courseId).single();
                if (c) crumbItems.push({ label: c.name, href: `course.html?id=${encodeURIComponent(courseId)}` });
            }
            crumbItems.push({ label: room.name });

            const content = document.getElementById('page-content');
            const topCrumbs = crumbs(crumbItems);
            content.innerHTML = `${topCrumbs}<div class="loader">Loading…</div>`;

            const extById = {};   // material id -> external_url (kept out of the DOM)

            const [recRes, mRes, qRes, sRes] = await Promise.all([
                db.from('recordings').select('id, title, professor, recorded_date, aws_url, is_visible, kind, order_index').eq('room_id', roomId).eq('kind', 'lecture').order('order_index', { ascending: true, nullsFirst: false }).order('created_at', { ascending: true }),
                db.from('materials').select('id, title, type, storage_path, external_url, category, is_visible, created_at, order_index').eq('room_id', roomId).order('order_index', { ascending: true, nullsFirst: false }).order('created_at', { ascending: true }),
                db.from('quizzes').select('id, title, is_visible').eq('room_id', roomId),
                db.from('app_settings').select('key, value').in('key', ['banner_presentations', 'banner_lectures', 'banner_quizzes'])
            ]);

            // Global category banners set once in the admin panel (Appearance). Empty/missing → default colour + icon.
            const bannerByKey = {};
            if (!sRes.error) (sRes.data || []).forEach(r => { if (r.value) bannerByKey[r.key] = r.value; });

            // Video Lectures
            const lecErr = !!recRes.error;
            if (lecErr) console.error('[subject] video lectures failed to load:', recRes.error);
            const lectures = lecErr ? [] : (recRes.data || []);

            // Presentations = study materials + additional notes (merged into one category)
            const matErr = !!mRes.error;
            if (matErr) console.error('[subject] study materials failed to load:', mRes.error);
            const materials = matErr ? [] : (mRes.data || []);
            materials.forEach(m => { if (m.external_url) extById[m.id] = m.external_url; });

            // Quizzes attach to the subject — only visible/accessible ones are returned by RLS.
            const quizErr = !!qRes.error;
            if (quizErr) console.error('[subject] quizzes failed to load:', qRes.error);
            const quizzes = (quizErr ? [] : (qRes.data || [])).filter(q => q.is_visible !== false);

            const CATS = {
                presentations: { label: 'Presentations', sub: 'Slides, PDFs & notes', icon: IC_PRES,  grad: 'linear-gradient(135deg,#7c3aed,#a855f7)', bkey: 'banner_presentations' },
                lectures:      { label: 'Video Lectures', sub: 'Recorded video lessons', icon: IC_VIDEO, grad: 'linear-gradient(135deg,#0d2a52,#4a90d9)', bkey: 'banner_lectures' },
                quizzes:       { label: 'Quizzes',       sub: 'Test your knowledge', icon: IC_QUIZ,  grad: 'linear-gradient(135deg,#059669,#10b981)', bkey: 'banner_quizzes' }
            };

            function catCard(key, count, err) {
                const c = CATS[key];
                const meta = err ? 'Open →' : `${count} ${count === 1 ? 'item' : 'items'} · Open →`;
                const img = bannerByKey[c.bkey];
                const top = img
                    ? `<div class="cc-top" style="background:url('${esc(img)}') center/cover;"></div>`
                    : `<div class="cc-top" style="background:${c.grad}">${c.icon}</div>`;
                return `<div class="course-card cat-card" data-cat="${key}">
                    ${top}
                    <div class="cc-body">
                        <div class="cc-title">${c.label}</div>
                        <div class="cc-sub">${c.sub}</div>
                        <div class="cc-meta">${meta}</div>
                    </div>
                </div>`;
            }

            // One compact row: icon + title on the left, action button (Play / Read / Open / Start) on the right.
            function itemRow({ locked, icon, title, sub, action, mid }) {
                const hl = mid && mid === lastReadId ? ' just-read' : '';
                return `<div class="item-row ${locked ? 'locked' : ''}${hl}"${mid ? ` data-mid="${mid}"` : ''}>
                    <div class="ir-icon">${icon}</div>
                    <div class="ir-body"><div class="ir-title">${title}</div>${sub ? `<div class="ir-sub">${sub}</div>` : ''}</div>
                    ${action}
                </div>`;
            }

            function renderCards() {
                content.innerHTML = `${topCrumbs}
                    <a class="btn btn-ghost" onclick="history.back()" style="margin-bottom:18px;cursor:pointer;">← Back</a>
                    <div class="card-grid">
                        ${catCard('presentations', materials.length, matErr)}
                        ${catCard('lectures', lectures.length, lecErr)}
                        ${catCard('quizzes', quizzes.length, quizErr)}
                    </div>`;
            }

            function renderCategory(key) {
                const c = CATS[key];
                let body = '';
                if (key === 'presentations') {
                    if (matErr) body = secErr('presentations');
                    else if (!materials.length) body = empty('No presentations yet.');
                    else body = materials.map(m => {
                        const sub = esc((m.type || 'file').toUpperCase()) + (m.category === 'note' ? ' · Note' : '');
                        const action = m.is_visible
                            ? (m.external_url
                                ? `<button class="btn btn-primary js-extlink" data-mid="${esc(m.id)}" data-title="${esc(m.title)}">Open</button>`
                                : `<button class="btn btn-primary js-read" data-mid="${esc(m.id)}" data-path="${esc(m.storage_path)}" data-title="${esc(m.title)}">Read</button>`)
                            : LOCK;
                        return itemRow({ locked: !m.is_visible, icon: IC_FILE, title: esc(m.title), sub, action, mid: esc(m.id) });
                    }).join('');
                } else if (key === 'lectures') {
                    if (lecErr) body = secErr('video lectures');
                    else if (!lectures.length) body = empty('No video lectures yet.');
                    else body = lectures.map(r => {
                        const action = r.is_visible
                            ? `<button class="btn btn-primary js-play" data-url="${esc(r.aws_url)}" data-title="${esc(r.title)}">▶ Play</button>`
                            : LOCK;
                        return itemRow({ locked: !r.is_visible, icon: IC_VIDEO, title: esc(r.title), sub: `${esc(r.professor)} · ${fmtDate(r.recorded_date)}`, action });
                    }).join('');
                } else {
                    if (quizErr) body = secErr('quizzes');
                    else if (!quizzes.length) body = empty('No quizzes yet.');
                    else body = quizzes.map(q => {
                        const action = `<button class="btn btn-primary" onclick="location.href='take-quiz.html?id=${encodeURIComponent(q.id)}'">Start Quiz</button>`;
                        return itemRow({ locked: false, icon: IC_QUIZ, title: esc(q.title || 'Quiz'), sub: 'Answer all questions correctly to pass', action });
                    }).join('');
                }
                content.innerHTML = `${topCrumbs}
                    <a class="btn btn-ghost js-back-cards" style="margin-bottom:18px;cursor:pointer;">← Back to ${esc(room.name)}</a>
                    <div class="section-title" style="margin-bottom:16px;">${c.icon} ${c.label}</div>
                    ${body}`;
            }

            // Render cards or a category based on the requested view.
            function render(cat) {
                if (cat && CATS[cat]) {
                    renderCategory(cat);
                    // Coming back to Presentations: jump to the last one opened instead of the top.
                    if (cat === 'presentations' && lastReadId) {
                        const el = content.querySelector('.item-row.just-read');
                        if (el) { requestAnimationFrame(() => { try { el.scrollIntoView({ block: 'center' }); } catch (e) {} }); return; }
                    }
                } else {
                    renderCards();
                }
                window.scrollTo(0, 0);
            }

            // Opening a category is a real history step, so Back from a PDF returns to the list (not the cards).
            function navTo(cat) {
                const p = new URLSearchParams(location.search);
                if (cat) p.set('cat', cat); else p.delete('cat');
                history.pushState({ cat: cat || null }, '', `subject.html?${p.toString()}`);
                render(cat);
            }
            window.addEventListener('popstate', () => render(new URLSearchParams(location.search).get('cat')));

            // Single delegated handler — content is re-rendered on navigation but the container persists.
            content.addEventListener('click', e => {
                const card = e.target.closest('.cat-card');
                if (card) { navTo(card.dataset.cat); return; }
                const back = e.target.closest('.js-back-cards');
                if (back) { if (history.state && history.state.cat) history.back(); else navTo(null); return; }
                const play = e.target.closest('.js-play');
                if (play) { openVideo(play.dataset.url, play.dataset.title); return; }
                const ext = e.target.closest('.js-extlink');
                if (ext) { openEmbed(extById[ext.dataset.mid], ext.dataset.title); return; }
                const read = e.target.closest('.js-read');
                if (read) { lastReadId = read.dataset.mid || ''; sessionStorage.setItem(LAST_KEY, lastReadId); openMaterial(read.dataset.path, read.dataset.title); }
            });

            render(new URLSearchParams(location.search).get('cat'));
        })();
    </script>
</body>
</html>
