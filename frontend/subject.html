<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Subject</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <!-- VIDEO PLAYER MODAL -->
    <div class="vid-overlay" id="vid-overlay">
        <div class="vid-box">
            <div class="vid-head">
                <h3 id="vid-title">Video</h3>
                <button class="vid-close" onclick="closeVideo()" title="Close (Esc)">&times;</button>
            </div>
            <video id="vid-player" controls controlsList="nodownload" disablePictureInPicture oncontextmenu="return false;"></video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        function fmtDate(d){ return d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : ''; }

        const LOCK = '<span class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Not released yet</span>';
        const secErr = (what) => `<div class="empty-state" style="padding:24px;"><h3 style="color:var(--red)">Couldn't load ${what}</h3><p>Please refresh. If it keeps happening, contact the office.</p></div>`;

        function openVideo(url, title) {
            document.getElementById('vid-title').textContent = title || 'Video';
            const p = document.getElementById('vid-player');
            p.src = url;
            document.getElementById('vid-overlay').classList.add('open');
            p.play().catch(()=>{});
        }
        function closeVideo() {
            const p = document.getElementById('vid-player');
            p.pause(); p.removeAttribute('src'); p.load();
            document.getElementById('vid-overlay').classList.remove('open');
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideo(); });
        function openMaterial(path, title) {
            location.href = `viewer.html?path=${encodeURIComponent(path)}&title=${encodeURIComponent(title || 'Material')}`;
        }
        function openExternal(url) {
            if (/^https?:\/\//i.test(url)) window.open(url, '_blank', 'noopener');
        }

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            const roomId = new URLSearchParams(location.search).get('id');
            if (!roomId) { location.href = 'courses.html'; return; }

            const { data: room, error: roomErr } = await db.from('rooms').select('id, name, description, is_visible').eq('id', roomId).single();
            if (roomErr && roomErr.code !== 'PGRST116') {  // PGRST116 = no rows (hidden/not enrolled) → redirect; anything else is a real failure
                console.error('[subject] subject failed to load:', roomErr);
                renderLayout('courses', 'Subject', '', auth.profile);
                document.getElementById('page-content').innerHTML = secErr('this subject') + `<a class="btn btn-ghost" href="courses.html" style="margin-top:12px;">← Back to courses</a>`;
                return;
            }
            if (!room || !room.is_visible) { location.href = 'courses.html'; return; }
            renderLayout('courses', room.name, 'Lessons, lectures & materials', auth.profile);

            document.getElementById('page-content').innerHTML = `
                <a class="btn btn-ghost" onclick="history.back()" style="margin-bottom:18px;cursor:pointer;">← Back</a>
                <div class="section"><div class="section-title">📘 Lessons</div><div id="lessons-box"><div class="loader">Loading…</div></div></div>
                <div class="section"><div class="section-title">🎥 Video Lectures</div><div id="lectures-box"><div class="loader">Loading…</div></div></div>
                <div class="section"><div class="section-title">📄 Study Materials</div><div id="materials-box"><div class="loader">Loading…</div></div></div>
                <div class="section"><div class="section-title">📝 Additional Notes</div><div id="notes-box"><div class="loader">Loading…</div></div></div>
                <div class="section"><div class="section-title">✅ Quizzes</div><div id="quizzes-box"><div class="loader">Loading…</div></div></div>
            `;

            const [lRes, recRes, mRes] = await Promise.all([
                db.from('lessons').select('id, title, description, order_index, is_visible').eq('room_id', roomId).order('order_index', { ascending: true }),
                db.from('recordings').select('id, title, professor, recorded_date, aws_url, is_visible, kind, order_index').eq('room_id', roomId).eq('kind', 'lecture').order('order_index', { ascending: true, nullsFirst: false }).order('created_at', { ascending: true }),
                db.from('materials').select('id, title, type, storage_path, external_url, category, is_visible, created_at, order_index').eq('room_id', roomId).order('order_index', { ascending: true, nullsFirst: false }).order('created_at', { ascending: true })
            ]);

            // Lessons (informational)
            const lessons = lRes.error ? [] : (lRes.data || []);
            if (lRes.error) {
                console.error('[subject] lessons failed to load:', lRes.error);
                document.getElementById('lessons-box').innerHTML = secErr('lessons');
            } else {
                document.getElementById('lessons-box').innerHTML = lessons.length === 0
                    ? `<div class="empty-state" style="padding:24px;"><p>No lessons yet.</p></div>`
                    : lessons.map(l => l.is_visible
                        ? `<div style="padding:14px 6px; border-bottom:1px solid var(--border);">
                               <h2 style="font-size:17px; font-weight:700; color:var(--navy-800); margin:0 0 4px;">${esc(l.title)}</h2>
                               ${l.description ? `<p style="margin:0; color:var(--text-muted); font-size:14px; line-height:1.6;">${esc(l.description)}</p>` : ''}
                           </div>`
                        : `<div style="padding:14px 6px; border-bottom:1px solid var(--border); opacity:.5; display:flex; align-items:center; justify-content:space-between; gap:12px;">
                               <div>
                                   <h2 style="font-size:17px; font-weight:700; color:var(--navy-800); margin:0 0 4px;">${esc(l.title)}</h2>
                                   ${l.description ? `<p style="margin:0; color:var(--text-muted); font-size:14px; line-height:1.6;">${esc(l.description)}</p>` : ''}
                               </div>
                               ${LOCK}
                           </div>`).join('');
            }

            // Video Lectures
            if (recRes.error) {
                console.error('[subject] video lectures failed to load:', recRes.error);
                document.getElementById('lectures-box').innerHTML = secErr('video lectures');
            } else {
                const lectures = recRes.data || [];
                document.getElementById('lectures-box').innerHTML = lectures.length === 0
                    ? `<div class="empty-state" style="padding:24px;"><p>No video lectures yet.</p></div>`
                    : lectures.map(r => `
                        <div class="item-row ${r.is_visible ? '' : 'locked'}">
                            <div class="ir-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>
                            <div class="ir-body"><div class="ir-title">${esc(r.title)}</div><div class="ir-sub">${esc(r.professor)} · ${fmtDate(r.recorded_date)}</div></div>
                            ${r.is_visible ? `<button class="btn btn-primary js-play" data-url="${esc(r.aws_url)}" data-title="${esc(r.title)}">▶ Play</button>` : LOCK}
                        </div>`).join('');
            }

            // Materials & Notes
            if (mRes.error) {
                console.error('[subject] study materials failed to load:', mRes.error);
                document.getElementById('materials-box').innerHTML = secErr('study materials');
                document.getElementById('notes-box').innerHTML = secErr('notes');
            } else {
                const mats = (mRes.data || []).filter(m => (m.category === 'note' ? 'note' : 'material') === 'material');
                const notes = (mRes.data || []).filter(m => m.category === 'note');
                const matHtml = list => list.length === 0
                    ? `<div class="empty-state" style="padding:24px;"><p>Nothing here yet.</p></div>`
                    : list.map(m => `
                        <div class="item-row ${m.is_visible ? '' : 'locked'}">
                            <div class="ir-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                            <div class="ir-body"><div class="ir-title">${esc(m.title)}</div><div class="ir-sub">${esc((m.type||'file').toUpperCase())}</div></div>
                            ${m.is_visible
                                ? (m.external_url
                                    ? `<button class="btn btn-primary js-extlink" data-url="${esc(m.external_url)}">Open ↗</button>`
                                    : `<button class="btn btn-primary js-read" data-path="${esc(m.storage_path)}" data-title="${esc(m.title)}">Read</button>`)
                                : LOCK}
                        </div>`).join('');
                document.getElementById('materials-box').innerHTML = matHtml(mats);
                document.getElementById('notes-box').innerHTML = matHtml(notes);
            }

            document.getElementById('page-content').addEventListener('click', e => {
                const play = e.target.closest('.js-play');
                if (play) { openVideo(play.dataset.url, play.dataset.title); return; }
                const ext = e.target.closest('.js-extlink');
                if (ext) { openExternal(ext.dataset.url); return; }
                const read = e.target.closest('.js-read');
                if (read) openMaterial(read.dataset.path, read.dataset.title);
            });

            // Quizzes (per-lesson) — only visible/accessible ones are returned by RLS
            const lessonTitleMap = {}; lessons.forEach(l => lessonTitleMap[l.id] = l.title);
            const lessonIds = lessons.map(l => l.id);
            let quizzes = [];
            if (lessonIds.length) {
                const { data, error: qErr } = await db.from('quizzes').select('id, lesson_id').in('lesson_id', lessonIds);
                if (qErr) {
                    console.error('[subject] quizzes failed to load:', qErr);
                    document.getElementById('quizzes-box').innerHTML = secErr('quizzes');
                    return;
                }
                quizzes = data || [];
            }
            document.getElementById('quizzes-box').innerHTML = quizzes.length === 0
                ? `<div class="empty-state" style="padding:24px;"><p>No quizzes yet.</p></div>`
                : quizzes.map(q => `
                    <div class="item-row">
                        <div class="ir-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
                        <div class="ir-body"><div class="ir-title">Quiz — ${esc(lessonTitleMap[q.lesson_id] || 'Lesson')}</div><div class="ir-sub">Answer all questions correctly to pass</div></div>
                        <button class="btn btn-primary" onclick="location.href='take-quiz.html?id=${encodeURIComponent(q.id)}'">Start Quiz</button>
                    </div>`).join('');
        })();
    </script>
</body>
</html>
