<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
    <style>
        .avatar-big { width: 84px; height: 84px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
            background: linear-gradient(135deg, var(--navy-800), var(--blue-500)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 28px; }
        .avatar-big img { width: 100%; height: 100%; object-fit: cover; }
        .prof-wrap { max-width: 640px; }
        .prof-wrap .panel { padding: 30px 34px; }
        .prof-wrap .form-field { margin-bottom: 22px; }
        .prof-wrap .form-field input, .prof-wrap .form-field select { max-width: 360px; }
        .prof-wrap .form-field input[disabled] { max-width: 460px; }
    </style>
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/mfa.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        const ALLOWED_IMG = ['png','jpg','jpeg','webp','gif'];
        const AVATAR_MAX = 500 * 1024;
        const TITLES = ['', 'Mr', 'Mrs', 'Ms', 'Mx', 'Dr'];
        let AUTH = null;

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            AUTH = auth;
            renderLayout('profile', 'My Profile', 'Your account details', auth.profile);

            const email = auth.session.user.email || '—';
            const initials = (auth.profile.full_name || 'S').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
            const { data: prof } = await db.from('profiles').select('title').eq('id', auth.session.user.id).single();
            const myTitle = (prof && prof.title) || '';
            document.getElementById('page-content').innerHTML = `
                <div class="prof-wrap">
                    <div class="panel" style="margin-bottom:22px; display:flex; align-items:center; gap:18px;">
                        <div class="avatar-big" id="avatar-big">${auth.profile.avatar_url ? `<img src="${esc(auth.profile.avatar_url)}" alt="">` : initials}</div>
                        <div>
                            <button class="btn btn-primary" id="avatar-btn">Upload Photo</button>
                            <input type="file" id="avatar-input" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">
                            <div class="hint" id="avatar-msg" style="margin-top:8px;">PNG, JPG, WEBP or GIF — up to 500&nbsp;KB.</div>
                        </div>
                    </div>
                    <div class="panel" style="margin-bottom:22px;">
                        <div class="alert" id="det-alert" style="display:none;"></div>
                        <div class="form-field">
                            <label>Title</label>
                            <select id="f-title" style="width:100%;height:46px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-family:'Inter',sans-serif;font-size:14px;outline:none;">${TITLES.map(t=>`<option value="${t}" ${t===myTitle?'selected':''}>${t||'—'}</option>`).join('')}</select>
                        </div>
                        <div class="form-field"><label>Full Name <span style="color:var(--text-muted);font-weight:400;">(set by the office)</span></label><input type="text" value="${esc(auth.profile.full_name||'')}" disabled></div>
                        <div class="form-field"><label>Email</label><input type="text" value="${esc(email)}" disabled></div>
                        <button type="button" class="btn btn-primary" id="det-btn">Save Title</button>
                    </div>
                    <div class="panel">
                        <div class="section-title" style="margin-bottom:16px;">Change Password</div>
                        <div class="alert" id="pw-alert" style="display:none;"></div>
                        <form id="pw-form">
                            <div class="form-field"><label>New Password</label><input type="password" id="pw1" placeholder="At least 8 characters" required></div>
                            <div class="form-field"><label>Confirm New Password</label><input type="password" id="pw2" placeholder="Re-type the new password" required></div>
                            <button type="submit" class="btn btn-primary" id="pw-btn">Update Password</button>
                        </form>
                    </div>
                    <div class="panel" style="margin-top:22px;">
                        <div class="section-title" style="margin-bottom:10px;">Two-Factor Authentication (2FA)</div>
                        <div id="mfa-section"></div>
                    </div>
                </div>`;

            // Avatar upload
            const msg = document.getElementById('avatar-msg');
            function showMsg(t, err){ msg.textContent = t; msg.style.color = err ? 'var(--red)' : 'var(--green)'; }
            document.getElementById('avatar-btn').onclick = () => document.getElementById('avatar-input').click();
            document.getElementById('avatar-input').onchange = async (e) => {
                const file = e.target.files[0]; e.target.value = '';
                if (!file) return;
                const ext = (file.name.split('.').pop() || '').toLowerCase();
                if (!file.type.startsWith('image/') || !ALLOWED_IMG.includes(ext)) { showMsg('Please choose an image (PNG, JPG, WEBP or GIF).', true); return; }
                if (file.size > AVATAR_MAX) { showMsg(`Image too large (${(file.size/1024).toFixed(0)} KB). Max 500 KB.`, true); return; }
                showMsg('Uploading…', false);
                try {
                    const uid = AUTH.session.user.id;
                    const path = `${uid}/avatar.${ext}`;
                    const up = await db.storage.from('avatars').upload(path, file, { contentType: file.type, upsert: true });
                    if (up.error) throw new Error(up.error.message);
                    const { data: pub } = db.storage.from('avatars').getPublicUrl(path);
                    const url = `${pub.publicUrl}?t=${Date.now()}`;
                    const upd = await db.from('profiles').update({ avatar_url: url }).eq('id', uid);
                    if (upd.error) throw new Error(upd.error.message);
                    document.getElementById('avatar-big').innerHTML = `<img src="${esc(url)}" alt="">`;
                    showMsg('Photo updated!', false);
                } catch (err) { showMsg(err.message, true); }
            };

            // Title save
            const detAlert = document.getElementById('det-alert');
            document.getElementById('det-btn').onclick = async () => {
                detAlert.style.display = 'none';
                const title = document.getElementById('f-title').value;
                const btn = document.getElementById('det-btn');
                btn.disabled = true; btn.textContent = 'Saving…';
                try {
                    const { error } = await db.from('profiles').update({ title: title || null }).eq('id', AUTH.session.user.id);
                    if (error) throw new Error(error.message);
                    detAlert.className = 'alert success'; detAlert.textContent = 'Title saved.'; detAlert.style.display = 'block';
                } catch (err) { detAlert.className = 'alert error'; detAlert.textContent = err.message; detAlert.style.display = 'block'; }
                finally { btn.disabled = false; btn.textContent = 'Save Title'; }
            };

            // Password change
            const alertBox = document.getElementById('pw-alert');
            function showAlert(m,t){ alertBox.className = `alert ${t}`; alertBox.textContent = m; alertBox.style.display='block'; }
            document.getElementById('pw-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                alertBox.style.display = 'none';
                const p1 = document.getElementById('pw1').value, p2 = document.getElementById('pw2').value;
                const btn = document.getElementById('pw-btn');
                if (p1.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }
                if (p1 !== p2) { showAlert('The two passwords do not match.', 'error'); return; }
                btn.disabled = true; btn.textContent = 'Updating…';
                try {
                    const { error } = await db.auth.updateUser({ password: p1 });
                    if (error) throw new Error(error.message);
                    document.getElementById('pw-form').reset();
                    showAlert('Password updated successfully.', 'success');
                } catch (err) { showAlert(err.message, 'error'); }
                finally { btn.disabled = false; btn.textContent = 'Update Password'; }
            });

            renderMfaSection('mfa-section');
        })();
    </script>
</body>
</html>
