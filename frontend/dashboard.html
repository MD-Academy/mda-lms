<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        function fmtDateTime(d){ return new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
        function loadError(boxId, what, err){
            console.error(`[dashboard] ${what} failed to load:`, err);
            const el = document.getElementById(boxId);
            if (el) el.innerHTML = `<div class="empty-state" style="padding:28px;"><h3 style="color:var(--red)">Couldn't load ${what}</h3><p>Please refresh the page. If it keeps happening, contact the office.</p></div>`;
        }

        // Renders a list that shows ~3 items, scrolls inside its own box for the rest,
        // and paginates 25/50/100 per page so the page itself never grows endlessly.
        function makePager(boxId, items, renderItem, emptyMsg){
            const box = document.getElementById(boxId);
            if (!box) return;
            if (!items.length){ box.innerHTML = `<div class="empty-state" style="padding:28px;"><p>${emptyMsg}</p></div>`; return; }
            let pageSize = 25, page = 0;
            function draw(){
                const total = items.length;
                const pages = Math.max(1, Math.ceil(total / pageSize));
                if (page >= pages) page = pages - 1;
                const start = page * pageSize;
                const slice = items.slice(start, start + pageSize);
                const showCtrls = total > 3;
                const showNav = pages > 1;
                box.innerHTML = `
                    <div class="scroll-list">${slice.map(renderItem).join('')}</div>
                    ${showCtrls ? `
                    <div class="pager">
                        <div class="pager-info">Showing ${start+1}–${start+slice.length} of ${total}</div>
                        <div class="pager-ctrls">
                            <label class="pager-size">Per page
                                <select class="js-size">
                                    <option value="25"${pageSize===25?' selected':''}>25</option>
                                    <option value="50"${pageSize===50?' selected':''}>50</option>
                                    <option value="100"${pageSize===100?' selected':''}>100</option>
                                </select>
                            </label>
                            ${showNav ? `<button class="pager-btn js-prev" ${page===0?'disabled':''}>‹ Prev</button>
                            <span class="pager-page">${page+1} / ${pages}</span>
                            <button class="pager-btn js-next" ${page>=pages-1?'disabled':''}>Next ›</button>` : ''}
                        </div>
                    </div>` : ''}`;
                // Cap the scroll box to exactly ~3 items tall; scroll inside it for the rest.
                const list = box.querySelector('.scroll-list');
                const kids = list.children;
                if (kids.length > 3){
                    const top = list.getBoundingClientRect().top;
                    const third = kids[2].getBoundingClientRect();
                    list.style.maxHeight = Math.round(third.bottom - top + 6) + 'px';
                    list.style.overflowY = 'auto';
                }
                const sizeSel = box.querySelector('.js-size');
                if (sizeSel) sizeSel.onchange = e => { pageSize = parseInt(e.target.value, 10); page = 0; draw(); };
                const prev = box.querySelector('.js-prev'); if (prev) prev.onclick = () => { if (page > 0){ page--; draw(); } };
                const next = box.querySelector('.js-next'); if (next) next.onclick = () => { if (page < pages-1){ page++; draw(); } };
            }
            draw();
        }

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;

            const firstName = (auth.profile.full_name || 'Student').split(/\s+/)[0];
            renderLayout('dashboard', 'Dashboard', 'Welcome to your learning portal', auth.profile);

            document.getElementById('page-content').innerHTML = `
                <div class="welcome-banner">
                    <h2>Welcome back, ${esc(firstName)}! 👋</h2>
                    <p>Here's what's happening in your studies.</p>
                </div>
                <div class="section">
                    <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> My Courses</div>
                    <div id="courses-box"><div class="loader">Loading your courses…</div></div>
                </div>
                <div class="section">
                    <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Upcoming</div>
                    <div id="schedule-box"><div class="loader">Loading schedule…</div></div>
                </div>
                <div class="section">
                    <div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg> Announcements</div>
                    <div id="ann-box"><div class="loader">Loading announcements…</div></div>
                </div>
            `;

            const today = new Date(); today.setHours(0,0,0,0);
            const todayIso = today.toISOString().slice(0,10);

            const [coursesRes, csRes, roomsRes, schedRes, annRes] = await Promise.all([
                db.from('courses').select('id, name, description, expires_at, image_url').order('name', { ascending: true }),
                db.from('course_subjects').select('course_id, room_id'),
                db.from('rooms').select('id, name'),
                db.from('schedule_entries').select('id, room_id, course_id, entry_date, topic, details').gte('entry_date', todayIso).order('entry_date', { ascending: true }).limit(200),
                db.from('announcements').select('id, title, body, course_id, posted_at').order('posted_at', { ascending: false }).limit(200)
            ]);

            // What this student is allowed to see: their enrolled courses + the subjects within them.
            const myCourseIds = new Set((coursesRes.data || []).map(c => c.id));
            const mySubjectIds = new Set((csRes.data || []).map(r => r.room_id));

            // Courses
            const coursesBox = document.getElementById('courses-box');
            if (coursesRes.error) {
                loadError('courses-box', 'your courses', coursesRes.error);
            } else {
                if (csRes.error) console.error('[dashboard] subject counts failed:', csRes.error);
                const courses = coursesRes.data || [];
                const subjCount = {};
                (csRes.data || []).forEach(r => { subjCount[r.course_id] = (subjCount[r.course_id] || 0) + 1; });
                if (courses.length === 0) {
                    coursesBox.innerHTML = `<div class="empty-state"><h3>No active courses</h3><p>You're not enrolled in an active course yet. Please contact the office.</p></div>`;
                } else {
                    coursesBox.innerHTML = `<div class="card-grid">${courses.map(c => `
                        <div class="course-card" onclick="location.href='course.html?id=${encodeURIComponent(c.id)}'">
                            <div class="cc-top" ${c.image_url ? `style="background:url('${esc(c.image_url)}') center/cover;"` : ''}>${c.image_url ? '' : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`}</div>
                            <div class="cc-body">
                                <div class="cc-title">${esc(c.name)}</div>
                                <div class="cc-sub">${esc(c.description) || 'Your enrolled course'}</div>
                                <div class="cc-meta">${subjCount[c.id] || 0} subject${(subjCount[c.id]||0)===1?'':'s'}</div>
                            </div>
                        </div>`).join('')}</div>`;
                }
            }

            // Schedule
            const schedBox = document.getElementById('schedule-box');
            if (schedRes.error) {
                loadError('schedule-box', 'your schedule', schedRes.error);
            } else {
                if (roomsRes.error) console.error('[dashboard] subject names failed:', roomsRes.error);
                const roomName = {}; (roomsRes.data || []).forEach(r => roomName[r.id] = r.name);
                // Only entries for everyone, my courses, or my subjects.
                const sched = (schedRes.data || []).filter(e =>
                    (!e.course_id && !e.room_id) ||
                    (e.course_id && myCourseIds.has(e.course_id)) ||
                    (e.room_id && mySubjectIds.has(e.room_id))
                );
                makePager('schedule-box', sched, e => {
                    const d = new Date(e.entry_date);
                    const day = d.toLocaleDateString('en-GB',{day:'2-digit'});
                    const mon = d.toLocaleDateString('en-GB',{month:'short'});
                    const tag = e.room_id ? `<span class="badge-subject">${esc(roomName[e.room_id] || 'Subject')}</span>` : `<span class="badge-general">General</span>`;
                    return `<div class="sched">
                        <div class="s-date"><div class="d">${day}</div><div class="m">${mon}</div></div>
                        <div class="s-body"><div class="s-topic">${esc(e.topic)}</div><div class="s-sub">${tag}${e.details ? ' · ' + esc(e.details) : ''}</div></div>
                    </div>`;
                }, 'Nothing scheduled coming up.');
                _observeSection('schedule-box', sched.map(e => ({ kind: 'schedule', id: e.id })));
            }

            // Announcements
            const annBox = document.getElementById('ann-box');
            if (annRes.error) {
                loadError('ann-box', 'announcements', annRes.error);
            } else {
                // Only general announcements or ones for my enrolled courses.
                const anns = (annRes.data || []).filter(a => !a.course_id || myCourseIds.has(a.course_id));
                makePager('ann-box', anns, a => `
                    <div class="notice">
                        <div class="n-head"><div class="n-title">${esc(a.title)}</div><div class="n-date">${fmtDateTime(a.posted_at)}</div></div>
                        <div class="n-body">${esc(a.body)}</div>
                    </div>`, 'No announcements right now.');
                _observeSection('ann-box', anns.map(a => ({ kind: 'announcement', id: a.id })));
            }
        })();

        // Scroll-to-read: ONLY an actual scroll marks items seen — never a page
        // load/refresh. When the student scrolls a section into view, its items
        // are marked read on the bell.
        let _notifPending = [];
        let _notifScrollTimer = null;
        function _observeSection(elId, items) {
            if (!items || !items.length || typeof markNotifsRead !== 'function') return;
            _notifPending.push({ elId, items });
            window.addEventListener('scroll', _notifOnScroll, { passive: true });
        }
        function _notifOnScroll() {
            clearTimeout(_notifScrollTimer);
            _notifScrollTimer = setTimeout(_notifCheckSeen, 250);
        }
        function _notifCheckSeen() {
            for (let i = _notifPending.length - 1; i >= 0; i--) {
                const el = document.getElementById(_notifPending[i].elId);
                if (!el) { _notifPending.splice(i, 1); continue; }
                const r = el.getBoundingClientRect();
                // The section is genuinely in view (its top has scrolled up into the window).
                if (r.top < window.innerHeight * 0.85 && r.bottom > 60) {
                    markNotifsRead(_notifPending[i].items);
                    _notifPending.splice(i, 1);
                }
            }
            if (!_notifPending.length) window.removeEventListener('scroll', _notifOnScroll);
        }
    </script>
</body>
</html>
