<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Teacher Feedback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        function fmtStamp(iso){ return iso ? new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : ''; }

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            renderLayout('feedback', 'Teacher Feedback', 'What your teachers have written for you', auth.profile);

            const content = document.getElementById('page-content');
            content.innerHTML = `<div id="box"><div class="loader">Loading your feedback…</div></div>`;
            const box = document.getElementById('box');

            // RLS returns only this student's own entries, and only the ones a teacher chose to share.
            const { data, error } = await db.from('student_notes')
                .select('id, body, course_id, author_name, created_at')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('[feedback] failed to load:', error);
                box.innerHTML = `<div class="empty-state"><h3 style="color:var(--red)">Couldn't load your feedback</h3><p>Please refresh the page. If it keeps happening, contact the office.</p></div>`;
                return;
            }

            const notes = data || [];
            if (notes.length === 0) {
                box.innerHTML = `<div class="empty-state">
                    <h3>No feedback yet</h3>
                    <p>When one of your teachers writes feedback for you, it appears here — and you'll get a notification in the bell at the top of the page.</p>
                </div>`;
                markFeedbackRead([]);
                return;
            }

            // Course names, so a note tied to a course can say which one.
            const courseIds = [...new Set(notes.map(n => n.course_id).filter(Boolean))];
            const names = {};
            if (courseIds.length) {
                const { data: cs } = await db.from('courses').select('id, name').in('id', courseIds);
                (cs || []).forEach(c => { names[c.id] = c.name; });
            }

            const rows = notes.map(n => `
                <div class="att-day" style="align-items:flex-start;flex-direction:column;gap:7px;">
                    <div style="font-size:12px;color:var(--text-muted);">
                        <strong style="color:var(--navy-800);">${esc(fmtStamp(n.created_at))}</strong>
                        · ${esc(n.author_name || 'Your teacher')}${n.course_id && names[n.course_id] ? ' · about ' + esc(names[n.course_id]) : ''}
                    </div>
                    <div style="font-size:14.5px;line-height:1.7;color:var(--text);white-space:pre-wrap;">${esc(n.body)}</div>
                </div>`).join('');

            box.innerHTML = `
                <div class="section">
                    <div class="section-title">💬 Feedback From Your Teachers</div>
                    <div class="att-card">
                        <p style="font-size:13px;color:var(--text-muted);margin:-4px 0 16px;line-height:1.55;">
                            Personal feedback your teachers have written for you — about how you're progressing, what to work on,
                            or advice after a class. The newest is first, and earlier feedback stays here so you can look back on it.
                        </p>
                        <div class="att-list">${rows}</div>
                    </div>
                </div>`;

            // Reading the page clears these from the bell.
            markFeedbackRead(notes.map(n => n.id));
        })();

        // Mark every feedback entry on this page as seen, so the bell count drops.
        async function markFeedbackRead(ids) {
            if (!ids.length) return;
            try {
                const { data: { session } } = await db.auth.getSession();
                if (!session) return;
                const rows = ids.map(id => ({ student_id: session.user.id, kind: 'feedback', ref_id: id }));
                await db.from('notification_reads').upsert(rows, { onConflict: 'student_id,kind,ref_id' });
                if (typeof _notifUnread !== 'undefined') {
                    _notifUnread = _notifUnread.filter(n => n.kind !== 'feedback');
                    if (typeof _renderBell === 'function') _renderBell();
                }
            } catch (e) { /* never block the page */ }
        }
    </script>
</body>
</html>
