<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #44464b; -webkit-user-select: none; user-select: none; }
        .reader-top {
            position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between;
            background: #0a1e3d; color: #fff; padding: 12px 20px;
        }
        .reader-top .rt-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .reader-top a { color: #fff; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
        .reader-top .rt-title { font-size: 14px; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .reader-top .rt-note { font-size: 12px; color: var(--gold, #d4af37); font-weight: 600; }
        .reader-top .rt-right { display: flex; align-items: center; gap: 14px; }
        .view-toggle { display: none; background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.28);
            border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .view-toggle:hover { background: rgba(255,255,255,0.22); }
        #pdf-container { padding: 24px 12px 60px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        #pdf-container canvas { max-width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.4); background: #fff; }
        #flipbook { margin: 28px auto; width: min(980px, 94vw); }
        #flipbook .stf__item { box-shadow: 0 4px 24px rgba(0,0,0,0.45); }
        #status { color: #e5e7eb; text-align: center; padding: 60px 20px; font-size: 15px; }
        /* Tiled watermark over the whole reading area */
        #watermark { position: fixed; inset: 48px 0 0 0; pointer-events: none; z-index: 20; background-repeat: repeat; opacity: 1; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="reader-top">
        <div class="rt-left">
            <a href="#" id="back-link">← Back</a>
            <span class="rt-title" id="rt-title">Loading…</span>
        </div>
        <div class="rt-right">
            <button id="view-toggle" class="view-toggle" onclick="toggleView()">📖 Book view</button>
            <span class="rt-note">Read-only</span>
        </div>
    </div>
    <div id="watermark"></div>
    <div id="pdf-container"><div id="status">Loading material…</div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('back-link').addEventListener('click', e => { e.preventDefault(); history.back(); });

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;

            const params = new URLSearchParams(location.search);
            const path = params.get('path');
            const title = params.get('title') || 'Material';
            document.getElementById('rt-title').textContent = title;
            if (!path) { document.getElementById('status').textContent = 'No file specified.'; return; }

            // Gentle ownership watermark tiled across the reading area (same for everyone).
            const wmText = "Property of Medical Doctor Academy &amp; Debrecen-Eilat Medical Faculty";
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='540' height='190'><text x='18' y='108' transform='rotate(-20 270 96)' fill='rgba(20,30,60,0.11)' font-size='12' font-family='sans-serif'>${wmText}</text></svg>`;
            document.getElementById('watermark').style.backgroundImage = `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;

            const statusEl = () => document.getElementById('status');
            const setStatus = (t) => { const s = statusEl(); if (s) s.innerHTML = t; };

            // Watchdog: if nothing has rendered after 45s (e.g. the server is waking up), surface it.
            let done = false;
            const watchdog = setTimeout(() => {
                if (!done) setStatus('Waking up the secure reader…<br>The first file opened after a quiet period can take up to a minute — please hold on.');
            }, 12000);

            // 1) Signed URL from the backend (verifies access + visibility).
            setStatus('Verifying access…');
            let signedUrl;
            try {
                const res = await apiRequest('POST', '/materials/signed-url/student', { storage_path: path });
                signedUrl = res.signed_url;
                if (!signedUrl) throw new Error('No file URL was returned.');
            } catch (err) {
                clearTimeout(watchdog); done = true;
                console.error('[viewer] signed-url failed:', err);
                setStatus(`Could not open this material: ${esc(err.message)}`);
                return;
            }

            // 2) Render by file type. Images show as <img>; PDFs via PDF.js; other formats can't preview.
            const ext = ((path.split(/[?#]/)[0].split('.').pop()) || '').toLowerCase();
            const IMG_EXT = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp'];

            if (IMG_EXT.includes(ext)) {
                const container = document.getElementById('pdf-container');
                container.innerHTML = '';
                const img = document.createElement('img');
                img.alt = title;
                img.style.maxWidth = '100%';
                img.style.boxShadow = '0 4px 20px rgba(0,0,0,0.4)';
                img.oncontextmenu = () => false;
                img.onload = () => { done = true; clearTimeout(watchdog); };
                img.onerror = () => { done = true; clearTimeout(watchdog); container.innerHTML = `<div id="status">Couldn't load this image.<br><a href="#" onclick="location.reload();return false;" style="color:#8ab4ff;">Refresh to retry</a></div>`; };
                img.src = signedUrl;
                container.appendChild(img);
                return;
            }

            if (ext && ext !== 'pdf') {
                done = true; clearTimeout(watchdog);
                document.getElementById('pdf-container').innerHTML = `<div id="status">This file type (<strong>.${esc(ext)}</strong>) can't be shown in the read-only reader.<br>Please provide it as a <strong>PDF</strong> for in-portal viewing, or contact the office.</div>`;
                return;
            }

            // PDF (or unknown extension — try PDF.js).
            setStatus('Loading the document…');
            try {
                if (typeof pdfjsLib === 'undefined') throw new Error('PDF viewer failed to load. Please refresh.');
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                PDF_DOC = await pdfjsLib.getDocument({ url: signedUrl }).promise;
                done = true; clearTimeout(watchdog);
                document.getElementById('view-toggle').style.display = 'inline-block';   // book view available for PDFs
                await renderScroll();
            } catch (err) {
                done = true; clearTimeout(watchdog);
                console.error('[viewer] PDF load failed:', err);
                document.getElementById('pdf-container').innerHTML = `<div id="status">This file couldn't be displayed in the reader.<br>(${esc((err && err.message) || 'error')})<br><br><a href="#" onclick="location.reload();return false;" style="color:#8ab4ff;">Refresh to retry</a></div>`;
            }
        })();

        function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

        // ── PDF VIEW MODES: scroll (default) ↔ book (page-flip) ──
        let PDF_DOC = null;
        let VIEW_MODE = 'scroll';
        let bookFlip = null;

        async function renderScroll() {
            const pdf = PDF_DOC; if (!pdf) return;
            const container = document.getElementById('pdf-container');
            container.style.display = 'flex';
            container.innerHTML = '';
            bookFlip = null;
            const width = Math.min(900, window.innerWidth - 24);
            for (let n = 1; n <= pdf.numPages; n++) {
                const page = await pdf.getPage(n);
                const base = page.getViewport({ scale: 1 });
                const scale = width / base.width;
                const viewport = page.getViewport({ scale: scale * (window.devicePixelRatio || 1) });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                canvas.style.width = (viewport.width / (window.devicePixelRatio || 1)) + 'px';
                container.appendChild(canvas);
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            }
        }

        async function renderBook() {
            const pdf = PDF_DOC; if (!pdf) return;
            const container = document.getElementById('pdf-container');
            container.style.display = 'block';
            container.innerHTML = `<div id="status">Preparing book view… 0/${pdf.numPages}</div>`;
            const images = [];
            let aspect = 1.414;
            for (let n = 1; n <= pdf.numPages; n++) {
                const page = await pdf.getPage(n);
                const vp = page.getViewport({ scale: 2 });   // crisp page images
                if (n === 1) aspect = vp.height / vp.width;
                const c = document.createElement('canvas');
                c.width = vp.width; c.height = vp.height;
                await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
                images.push(c.toDataURL('image/jpeg', 0.85));
                const s = document.getElementById('status'); if (s) s.textContent = `Preparing book view… ${n}/${pdf.numPages}`;
                if (VIEW_MODE !== 'book') return;   // user switched away mid-prep
            }
            if (VIEW_MODE !== 'book') return;
            container.innerHTML = '<div id="flipbook"></div>';
            const baseW = 460, baseH = Math.round(baseW * aspect);
            try {
                bookFlip = new St.PageFlip(document.getElementById('flipbook'), {
                    width: baseW, height: baseH, size: 'stretch',
                    minWidth: 300, maxWidth: 600, minHeight: 380, maxHeight: 900,
                    drawShadow: true, flippingTime: 600, showCover: false, usePortrait: true, mobileScrollSupport: false
                });
                bookFlip.loadFromImages(images);
            } catch (err) {
                console.error('[viewer] book view failed:', err);
                container.innerHTML = `<div id="status">Couldn't open book view. Switching back to scrolling…</div>`;
                VIEW_MODE = 'scroll';
                document.getElementById('view-toggle').textContent = '📖 Book view';
                renderScroll();
            }
        }

        function toggleView() {
            VIEW_MODE = VIEW_MODE === 'scroll' ? 'book' : 'scroll';
            document.getElementById('view-toggle').textContent = VIEW_MODE === 'book' ? '📄 Scroll view' : '📖 Book view';
            if (VIEW_MODE === 'book') renderBook(); else renderScroll();
            window.scrollTo({ top: 0 });
        }
    </script>
</body>
</html>
