<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        let QUIZ = null, QUESTIONS = [], answers = {}, timer = null, submitting = false;

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            const quizId = new URLSearchParams(location.search).get('id');
            if (!quizId) { location.href = 'courses.html'; return; }
            renderLayout('courses', 'Quiz', 'Answer every question correctly to pass', auth.profile);
            const content = document.getElementById('page-content');
            content.innerHTML = `<div class="loader">Loading quiz…</div>`;

            let data;
            try {
                data = await apiRequest('POST', '/student/quiz-questions', { quiz_id: quizId });
            } catch (err) {
                content.innerHTML = `<div class="empty-state"><h3>Couldn't load this quiz</h3><p>${esc(err.message)}</p><a class="btn btn-ghost" onclick="history.back()" style="margin-top:12px;cursor:pointer;">Back</a></div>`;
                return;
            }
            QUIZ = data.quiz; QUESTIONS = data.questions || [];

            if (data.cooldown_remaining > 0) {
                const m = Math.floor(data.cooldown_remaining/60), s = data.cooldown_remaining%60;
                content.innerHTML = `<div class="empty-state"><h3>Take a short break ⏳</h3><p>You can retake this quiz in <strong>${m}m ${s}s</strong>.</p><a class="btn btn-ghost" onclick="history.back()" style="margin-top:12px;cursor:pointer;">Back</a></div>`;
                return;
            }
            if (QUESTIONS.length === 0) {
                content.innerHTML = `<div class="empty-state"><h3>No questions yet</h3><p>This quiz has no questions.</p><a class="btn btn-ghost" onclick="history.back()" style="margin-top:12px;cursor:pointer;">Back</a></div>`;
                return;
            }
            renderQuiz();
        })();

        function renderQuiz() {
            const content = document.getElementById('page-content');
            content.innerHTML = `
                <div class="exam-meta">
                    ${QUIZ.time_limit_minutes ? `<span class="timer" id="timer"></span>` : ''}
                    <h2>${esc(QUIZ.title || 'Quiz')}</h2>
                    <p>Answer <strong>all ${QUESTIONS.length}</strong> questions correctly to pass.</p>
                </div>
                <div id="questions">${QUESTIONS.map((q, i) => {
                    const opts = Array.isArray(q.options_json) ? q.options_json : [];
                    return `<div class="q-card" id="q-${q.id}">
                        <div class="q-num">Question ${i+1} of ${QUESTIONS.length}</div>
                        <div class="q-text">${esc(q.question_text)}</div>
                        ${opts.map((o, oi) => `<label class="opt" onclick="pick('${q.id}', ${oi}, this)"><input type="radio" name="q-${q.id}" value="${oi}"> <span>${esc(o)}</span></label>`).join('')}
                    </div>`;
                }).join('')}</div>
                <div style="display:flex;gap:12px;align-items:center;margin-top:8px;">
                    <button class="btn btn-primary" id="submit-btn" onclick="submitQuiz(false)">Submit Quiz</button>
                    <a class="btn btn-ghost" onclick="history.back()" style="cursor:pointer;">Cancel</a>
                </div>`;
            if (QUIZ.time_limit_minutes) startTimer(QUIZ.time_limit_minutes * 60);
        }

        function pick(qid, oi, el) {
            answers[qid] = oi;
            const card = document.getElementById('q-' + qid);
            card.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
            el.classList.add('sel');
            el.querySelector('input').checked = true;
        }
        function startTimer(seconds) {
            const el = document.getElementById('timer');
            function tick() {
                if (seconds <= 0) { clearInterval(timer); submitQuiz(true); return; }
                const m = Math.floor(seconds/60), s = seconds%60;
                el.textContent = `⏱ ${m}:${String(s).padStart(2,'0')}`;
                seconds--;
            }
            tick(); timer = setInterval(tick, 1000);
        }
        async function submitQuiz(auto) {
            if (submitting) return;
            const unanswered = QUESTIONS.filter(q => answers[q.id] === undefined).length;
            if (!auto && unanswered > 0) { const ok = await confirmDialog({ title: 'Submit quiz?', message: `You have ${unanswered} unanswered question(s). Submit anyway?`, confirmText: 'Submit anyway', cancelText: 'Keep answering' }); if (!ok) return; }
            submitting = true;
            if (timer) clearInterval(timer);
            const btn = document.getElementById('submit-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }
            try {
                const res = await apiRequest('POST', '/student/quiz-submit', { quiz_id: QUIZ.id, answers });
                showResult(res);
            } catch (err) {
                submitting = false;
                if (btn) { btn.disabled = false; btn.textContent = 'Submit Quiz'; }
                await alertDialog({ title: 'Could not submit', message: err.message, danger: true });
            }
        }
        function showResult(res) {
            const pass = res.passed;
            document.getElementById('page-content').innerHTML = `
                <div class="result-card">
                    <div class="r-score" style="color:${pass ? 'var(--green)' : 'var(--red)'};">${res.score}%</div>
                    <div class="r-badge ${pass ? 'pass' : 'fail'}">${pass ? '✓ Passed' : '✕ Not passed'}</div>
                    <p style="color:var(--text-muted);">You got ${res.correct} of ${res.total} correct. ${pass ? 'Perfect — you nailed it! 🎉' : 'You need every question correct to pass.'}</p>
                    ${(!pass && res.wrong && res.wrong.length) ? `<div class="r-review"><strong>Questions to review:</strong> ${res.wrong.map(n => '#' + n).join(', ')}.<br><span style="color:var(--text-muted);">Review these and try again after the short cooldown. You've got this. 💪</span></div>` : ''}
                    <div style="margin-top:22px;"><a class="btn btn-ghost" onclick="history.back()" style="cursor:pointer;">Back to Subject</a></div>
                </div>`;
        }
    </script>
</body>
</html>
