<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png?v=1">
    <title>Medical Doctor Academy — Recordings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/student.css">
    <style>
        .rate-overlay { position: fixed; inset: 0; background: rgba(10,18,40,.55); display: none; align-items: center; justify-content: center; z-index: 2200; padding: 20px; }
        .rate-overlay.open { display: flex; }
        .rate-box { background: var(--card); border-radius: 16px; padding: 24px; width: 100%; max-width: 430px; box-shadow: 0 20px 50px rgba(10,18,40,.3); }
        .rate-box h3 { margin: 0; font-size: 18px; color: var(--navy-800); }
    </style>
</head>
<body>
    <div class="layout" id="app-layout"></div>

    <!-- RATE-AFTER-WATCHING PROMPT -->
    <div class="rate-overlay" id="rate-overlay">
        <div class="rate-box">
            <h3>How was this class?</h3>
            <p id="rate-sub" style="color:var(--text-muted);font-size:13px;margin:4px 0 14px;"></p>
            <div class="fb-stars" id="rate-stars"></div>
            <textarea id="rate-comment" class="fb-comment" rows="2" placeholder="Optional comment…"></textarea>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
                <button class="btn btn-ghost" onclick="closeRate()">Skip</button>
                <button class="btn btn-primary" id="rate-save" onclick="saveRate()">Submit</button>
            </div>
        </div>
    </div>

    <div class="vid-overlay" id="vid-overlay">
        <div class="vid-box">
            <div class="vid-head">
                <h3 id="vid-title">Recording</h3>
                <button class="vid-close" onclick="closeVideo()" title="Close (Esc)">&times;</button>
            </div>
            <video id="vid-player" controls controlsList="nodownload" disablePictureInPicture oncontextmenu="return false;"></video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function esc(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }
        function fmtDate(d){ return d ? new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}) : ''; }
        const LOCK = '<span class="lock-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Not released yet</span>';

        let STUDENT_UID = null, playedRec = null, RATE = null;

        function openVideo(url, title){ document.getElementById('vid-title').textContent = title||'Recording'; const p=document.getElementById('vid-player'); p.src=url; document.getElementById('vid-overlay').classList.add('open'); p.play().catch(()=>{}); }
        function closeVideo(){
            const p=document.getElementById('vid-player'); p.pause(); p.removeAttribute('src'); p.load();
            document.getElementById('vid-overlay').classList.remove('open');
            if (playedRec) { const r = playedRec; playedRec = null; promptRate(r); }   // "rate at the end of the lesson"
        }
        document.addEventListener('keydown', e => {
            if (e.key !== 'Escape') return;
            if (document.getElementById('rate-overlay').classList.contains('open')) { closeRate(); return; }
            closeVideo();
        });

        // Rate a recorded class after watching (attributed to a course the student is enrolled in).
        async function promptRate(rec){
            if (!rec || !rec.id) return;
            const { data: ex } = await db.from('feedback').select('id, stars, comment, course_id').eq('target_type', 'recording').eq('target_id', rec.id).limit(1);
            const existing = (ex || [])[0];
            let courseId = existing ? existing.course_id : null;
            if (!courseId) {
                const { data: rc } = await db.from('recording_courses').select('course_id').eq('recording_id', rec.id);
                courseId = ((rc || [])[0] || {}).course_id || null;   // RLS returns only the student's enrolled courses
            }
            if (!courseId) return;   // can't attribute to a course → skip quietly
            RATE = { recId: rec.id, courseId, selected: existing ? existing.stars : 0, existingId: existing ? existing.id : null };
            document.getElementById('rate-sub').textContent = rec.title || '';
            document.getElementById('rate-comment').value = (existing && existing.comment) ? existing.comment : '';
            renderRateStars(RATE.selected);
            const btn = document.getElementById('rate-save');
            btn.textContent = existing ? 'Update' : 'Submit'; btn.disabled = false;
            document.getElementById('rate-overlay').classList.add('open');
        }
        function renderRateStars(sel){
            document.getElementById('rate-stars').innerHTML = [1,2,3,4,5].map(i => `<span class="fb-star ${i <= sel ? 'on' : ''}" data-star="${i}">★</span>`).join('');
        }
        document.getElementById('rate-stars').addEventListener('click', e => {
            const s = e.target.closest('.fb-star'); if (!s || !RATE) return;
            RATE.selected = +s.dataset.star; renderRateStars(RATE.selected);
        });
        function closeRate(){ document.getElementById('rate-overlay').classList.remove('open'); RATE = null; }
        async function saveRate(){
            if (!RATE || !RATE.selected) return;   // require a star
            const btn = document.getElementById('rate-save'); btn.disabled = true; btn.textContent = 'Saving…';
            const comment = document.getElementById('rate-comment').value.trim();
            try {
                const payload = { stars: RATE.selected, comment: comment || null, updated_at: new Date().toISOString() };
                if (RATE.existingId) {
                    const { error } = await db.from('feedback').update(payload).eq('id', RATE.existingId);
                    if (error) throw new Error(error.message);
                } else {
                    const ins = await db.from('feedback').insert({ student_id: STUDENT_UID, course_id: RATE.courseId, target_type: 'recording', target_id: RATE.recId, ...payload });
                    if (ins.error) throw new Error(ins.error.message);
                }
                closeRate();
            } catch (err) { alert('Could not save rating: ' + err.message); btn.disabled = false; btn.textContent = 'Submit'; }
        }

        (async () => {
            const auth = await requireStudent();
            if (!auth) return;
            STUDENT_UID = auth.session.user.id;
            renderLayout('recordings', 'Zoom Recordings', 'Class recordings for your courses', auth.profile);
            document.getElementById('page-content').innerHTML = `
                <div class="section" id="live-section" style="display:none;margin-bottom:26px;">
                    <div class="section-title">🔴 Live Class Links</div>
                    <div id="live-links"></div>
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;">
                    <input type="text" id="search-input" placeholder="Search by title or professor…" style="flex:1;min-width:200px;height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-family:inherit;font-size:14px;outline:none;">
                    <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;">From <input type="date" id="date-from" style="height:40px;border:1.5px solid var(--border);border-radius:8px;padding:0 8px;font-family:inherit;"></label>
                    <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;">To <input type="date" id="date-to" style="height:40px;border:1.5px solid var(--border);border-radius:8px;padding:0 8px;font-family:inherit;"></label>
                    <select id="page-size" style="height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 10px;font-family:inherit;background:#fff;cursor:pointer;">
                        <option value="25">25 / page</option><option value="50">50 / page</option><option value="100">100 / page</option>
                    </select>
                </div>
                <div id="box"><div class="loader">Loading recordings…</div></div>
                <div id="pager" style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;flex-wrap:wrap;">
                    <div id="pager-info" style="font-size:13px;color:var(--text-muted);"></div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <button class="btn btn-ghost" id="prev-btn">← Prev</button>
                        <span id="page-label" style="font-size:13px;"></span>
                        <button class="btn btn-ghost" id="next-btn">Next →</button>
                    </div>
                </div>`;

            let currentPage = 1, pageSize = 25, totalCount = 0, searchQuery = '', dateFrom = '', dateTo = '', timer = null;
            const box = document.getElementById('box');

            // Live class join links (per enrolled course) — read-only for students.
            async function loadLiveLinks() {
                const { data, error } = await db.from('meeting_links')
                    .select('id, title, host_name, url, course_id, courses(name)')
                    .order('created_at', { ascending: false });
                if (error) { console.error('[recordings] live links failed:', error); return; }
                const links = data || [];
                if (!links.length) return;   // section stays hidden
                const wrap = document.getElementById('live-links');
                wrap.innerHTML = links.map(l => {
                    const safeUrl = /^https?:\/\//i.test(l.url) ? l.url : '';
                    const cname = l.courses && l.courses.name ? ' · ' + esc(l.courses.name) : '';
                    return `<div class="item-row">
                        <div class="ir-icon" style="background:linear-gradient(135deg,#b91c5c,#e11d48);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>
                        <div class="ir-body"><div class="ir-title">${esc(l.title)}</div><div class="ir-sub">${esc(l.host_name)}${cname}</div></div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-ghost js-copy" data-url="${esc(safeUrl)}">Copy</button>
                            ${safeUrl ? `<a class="btn btn-primary" href="${esc(safeUrl)}" target="_blank" rel="noopener noreferrer">Open ↗</a>` : ''}
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('live-section').style.display = '';
            }
            document.getElementById('live-links').addEventListener('click', async e => {
                const c = e.target.closest('.js-copy'); if (!c) return;
                const url = c.dataset.url; if (!url) return;
                const orig = c.textContent;
                try { await navigator.clipboard.writeText(url); }
                catch (err) { window.prompt('Copy this link:', url); return; }
                c.textContent = 'Copied ✓';
                setTimeout(() => { c.textContent = orig; }, 1500);
            });
            loadLiveLinks();

            box.addEventListener('click', e => { const b = e.target.closest('.js-play'); if (b) { playedRec = { id: b.dataset.id, title: b.dataset.title }; openVideo(b.dataset.url, b.dataset.title); } });
            document.getElementById('search-input').addEventListener('input', () => {
                clearTimeout(timer);
                timer = setTimeout(() => { searchQuery = document.getElementById('search-input').value.trim(); currentPage = 1; load(); }, 300);
            });
            ['date-from', 'date-to', 'page-size'].forEach(id => document.getElementById(id).addEventListener('change', () => {
                dateFrom = document.getElementById('date-from').value || '';
                dateTo = document.getElementById('date-to').value || '';
                pageSize = parseInt(document.getElementById('page-size').value, 10) || 25;
                currentPage = 1; load();
            }));
            document.getElementById('prev-btn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; load(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
            document.getElementById('next-btn').addEventListener('click', () => { const tp = Math.max(1, Math.ceil(totalCount / pageSize)); if (currentPage < tp) { currentPage++; load(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });

            async function load() {
                box.innerHTML = `<div class="loader">Loading recordings…</div>`;
                const from = (currentPage - 1) * pageSize, to = from + pageSize - 1;
                let q = db.from('recordings').select('id, title, professor, recorded_date, aws_url, is_visible', { count: 'exact' }).eq('kind', 'zoom');
                const term = searchQuery.replace(/[%,()]/g, ' ').trim();
                if (term) q = q.or(`title.ilike.%${term}%,professor.ilike.%${term}%`);
                if (dateFrom) q = q.gte('recorded_date', dateFrom);
                if (dateTo) q = q.lte('recorded_date', dateTo);
                q = q.order('recorded_date', { ascending: false }).range(from, to);

                const { data, error, count } = await q;
                if (error) {
                    console.error('[recordings] load failed:', error);
                    box.innerHTML = `<div class="empty-state"><h3 style="color:var(--red)">Couldn't load recordings</h3><p>Please refresh. If it keeps happening, contact the office.</p></div>`;
                    renderPager(); return;
                }
                const recs = data || []; totalCount = count || 0;
                if (recs.length === 0) {
                    const any = searchQuery || dateFrom || dateTo;
                    box.innerHTML = `<div class="empty-state"><h3>${any ? 'No recordings match' : 'No recordings yet'}</h3><p>${any ? 'Try a different search or date range.' : 'Class recordings for your courses will appear here.'}</p></div>`;
                    renderPager(); return;
                }
                box.innerHTML = recs.map(r => `
                    <div class="item-row ${r.is_visible ? '' : 'locked'}">
                        <div class="ir-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>
                        <div class="ir-body"><div class="ir-title">${esc(r.title)}</div><div class="ir-sub">${esc(r.professor)} · ${fmtDate(r.recorded_date)}</div></div>
                        ${r.is_visible ? `<button class="btn btn-primary js-play" data-id="${esc(r.id)}" data-url="${esc(r.aws_url)}" data-title="${esc(r.title)}">▶ Play</button>` : LOCK}
                    </div>`).join('');
                renderPager();
            }

            function renderPager() {
                const tp = Math.max(1, Math.ceil(totalCount / pageSize));
                if (currentPage > tp) currentPage = tp;
                const info = document.getElementById('pager-info');
                if (totalCount === 0) info.textContent = '';
                else { const s = (currentPage - 1) * pageSize + 1, e = Math.min(currentPage * pageSize, totalCount); info.textContent = `Showing ${s}–${e} of ${totalCount}`; }
                document.getElementById('page-label').textContent = `Page ${currentPage} of ${tp}`;
                const prev = document.getElementById('prev-btn'), next = document.getElementById('next-btn');
                prev.disabled = currentPage <= 1; next.disabled = currentPage >= tp;
                prev.style.opacity = prev.disabled ? '.4' : '1'; next.style.opacity = next.disabled ? '.4' : '1';
            }

            load();
        })();
    </script>
</body>
</html>
