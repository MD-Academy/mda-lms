services:
  - type: web
    name: mda-lms-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://onyqepnxecihcyzxifiw.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://students.medicaldoctor-studies.com,https://admin.medicaldoctor-studies.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Medical Doctor Academy <noreply@updates.medicaldoctor-studies.com>
      - key: EMAIL_REPLY_TO
        value: info@medicaldoctor-studies.com
      - key: STUDENT_URL
        value: https://students.medicaldoctor-studies.com
      - key: LOGO_URL
        value: https://students.medicaldoctor-studies.com/assets/images/mda-logo.png
      - key: CRON_SECRET
        sync: false
